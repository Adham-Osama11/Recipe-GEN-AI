services:
  - type: web
    name: recipe-gen-ai
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_TEMPERATURE
        value: "0.85"
      - key: LLM_MAX_RETRIES
        value: "2"
      - key: PARSER_MAX_RETRIES
        value: "2"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "45"
      - key: ALLOWED_ORIGINS
        value: "*"
